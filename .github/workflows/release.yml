name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_ref:
        description: 'Existing tag or commit to publish to npm (for example, v0.5.7)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          package-name: '@chisiki/sdk'
          include-component-in-tag: false

  publish-npm:
    needs: release-please
    if: ${{ github.event_name == 'push' && needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires Node >=22.14.0 and npm >=11.5.1.
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Show publish toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Package dry run
        run: npm pack --dry-run

      - name: Publish to npm with trusted publishing
        run: npm publish --access public --provenance

  publish-npm-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout requested release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires Node >=22.14.0 and npm >=11.5.1.
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Show publish toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Package dry run
        run: npm pack --dry-run

      - name: Publish to npm with trusted publishing
        run: npm publish --access public --provenance
